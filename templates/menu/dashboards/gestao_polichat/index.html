{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Polichat - Portal GGCI</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', };</script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="{% static 'menu/dashboards/gestao_polichat/style.css' %}">
</head>

<body class="bg-[#f8f6fb] text-gray-800 fixed inset-0 p-4 lg:p-6 flex transition-colors duration-500 overflow-hidden">

    <!-- Bolhas de fundo animadas -->
    <div class="bg-color-1 absolute top-[-15%] left-[-10%] w-[65vw] h-[65vh] bg-pink-500/70 rounded-full blur-[140px] pointer-events-none z-0"></div>
    <div class="bg-color-2 absolute bottom-[-15%] left-[10%] w-[60vw] h-[60vh] bg-purple-600/70 rounded-full blur-[140px] pointer-events-none z-0"></div>
    <div class="bg-color-3 absolute top-[-5%] right-[-10%] w-[60vw] h-[60vh] bg-yellow-400/60 rounded-full blur-[140px] pointer-events-none z-0"></div>
    <div class="bg-color-4 absolute bottom-[-10%] right-[5%] w-[65vw] h-[65vh] bg-teal-400/60 rounded-full blur-[140px] pointer-events-none z-0"></div>

    <!-- Container principal (página inteira, sem sidebar) -->
    <div class="w-full h-full bg-white/70 backdrop-blur-2xl border border-white/80 rounded-[2rem] shadow-2xl flex flex-col overflow-hidden relative z-10">

        <!-- ==========================================
             HEADER
             ========================================== -->
        <header class="h-24 px-8 lg:px-10 flex justify-between items-center border-b border-pink-100/50 bg-white/40 backdrop-blur-md shrink-0 z-10">
            <div class="flex items-center gap-5">
                <div class="w-16 h-16 bg-gradient-to-br from-pink-100 to-fuchsia-100 text-pink-600 rounded-2xl flex items-center justify-center border border-pink-200 shadow-sm">
                    <i class="fa-solid fa-bezier-curve text-3xl"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-black text-gray-800 tracking-tight">Gestão Polichat</h2>
                    <p class="text-[14px] text-gray-500 font-semibold mt-0.5">Acompanhamento de atendimentos e desempenho</p>
                </div>
            </div>
            <a href="{% url 'dashboards' %}"
                class="px-5 py-2.5 bg-white/80 hover:bg-pink-50 text-pink-600 font-bold rounded-xl transition-all shadow-sm border border-pink-100 flex items-center gap-2 text-sm">
                <i class="fa-solid fa-arrow-left"></i> Voltar
            </a>
        </header>

        <!-- ==========================================
             CONTEÚDO PRINCIPAL
             ========================================== -->
        <div class="flex-1 p-4 lg:p-6 flex flex-col gap-3 overflow-hidden relative z-10">

            <!-- Barra de ações -->
            <div class="bg-white/90 backdrop-blur-xl border border-white/80 p-2 rounded-[1rem] shadow-[0_8px_20px_rgb(0,0,0,0.03)] flex items-center shrink-0">

                <button id="btn-atualizar"
                    class="text-white bg-gradient-to-r from-purple-500 via-purple-600 to-purple-700 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-purple-300 shadow-lg shadow-purple-500/40 font-bold rounded-xl text-[13px] px-5 py-2.5 tracking-widest uppercase flex items-center justify-center gap-2 w-64 transition-all">
                    <i class="fa-solid fa-rotate"></i><span>Atualizar Dashboard</span>
                </button>

                <div class="flex-1 mx-4 bg-gray-100 rounded-lg h-7 border border-gray-200 shadow-inner relative flex items-center justify-center overflow-hidden">
                    <div id="progress-bar"
                        class="absolute top-0 left-0 h-full bg-gradient-to-r from-pink-400 to-purple-500 transition-all duration-500 ease-out"
                        style="width: 0%;"></div>
                    <span id="progress-text"
                        class="relative z-10 text-[13px] font-black text-gray-700 tracking-wide drop-shadow-[0_0_2px_rgba(255,255,255,0.8)]">0%</span>
                </div>

                <button id="btn-download"
                    class="text-gray-500 bg-gradient-to-r from-gray-100 via-gray-200 to-gray-300 shadow-sm font-bold rounded-xl text-[13px] px-5 py-2.5 tracking-widest uppercase flex items-center justify-center gap-2 w-64 transition-all cursor-not-allowed"
                    disabled>
                    <i class="fa-solid fa-download"></i><span>Baixar Excel</span>
                </button>

            </div>

            <!-- Console de logs (terminal) -->
            <div class="flex-1 min-h-[150px] bg-[#111116] border border-gray-800 rounded-[1.5rem] shadow-2xl flex flex-col overflow-hidden">
                <div class="bg-[#1a1b26] px-5 py-2.5 flex items-center justify-between border-b border-gray-800 shrink-0">
                    <div class="flex space-x-2.5">
                        <div class="w-3.5 h-3.5 rounded-full bg-[#ff5f56] shadow-sm"></div>
                        <div class="w-3.5 h-3.5 rounded-full bg-[#ffbd2e] shadow-sm"></div>
                        <div class="w-3.5 h-3.5 rounded-full bg-[#27c93f] shadow-sm"></div>
                    </div>
                    <span class="text-gray-400 text-[11px] font-mono tracking-widest font-bold flex items-center gap-2">
                        <i class="fa-solid fa-terminal text-gray-500"></i> CONSOLE — POLICHAT
                    </span>
                    <div class="w-10"></div>
                </div>

                <div id="console-logs"
                    class="p-6 flex-1 overflow-y-auto font-mono text-[13px] leading-relaxed custom-scrollbar-dark bg-[#0d0d12] text-gray-300">
                    <div class="flex gap-2 mb-1">
                        <span class="text-pink-500 font-bold">ovg@polichat:</span>
                        <span class="text-purple-400">~</span>
                        <span class="text-white">$</span>
                        <span class="text-gray-300 animate-pulse">atualizar_dashboard --verbose</span>
                    </div>

                    <div class="text-pink-500/80 italic mb-2">
                        <i class="fa-solid fa-angle-right"></i> Aguardando início...
                    </div>

                    <div class="inline-block w-2 h-4 bg-pink-500 ml-1 align-middle animate-bounce"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="{% static 'menu/dashboards/gestao_polichat/script.js' %}"></script>
</body>

</html>
